<!DOCTYPE html>
<html>
<head>
    <title>Test AJAX Login</title>
    <meta name="csrf-token" content="test">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8">
    <h1 class="text-2xl font-bold mb-4">Test AJAX Login</h1>
    
    <div class="mb-4">
        <button onclick="testInvalidPassword()" class="bg-red-500 text-white px-4 py-2 rounded mr-2">
            Test Invalid Password
        </button>
        <button onclick="testInvalidEmail()" class="bg-orange-500 text-white px-4 py-2 rounded mr-2">
            Test Invalid Email
        </button>
    </div>
    
    <div id="result" class="bg-gray-100 p-4 rounded"></div>
    
    <script>
        // Get CSRF token
        async function getCsrfToken() {
            try {
                const response = await fetch('/login');
                const text = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');
                const tokenMeta = doc.querySelector('meta[name="csrf-token"]');
                return tokenMeta ? tokenMeta.getAttribute('content') : null;
            } catch (error) {
                console.error('Error getting CSRF token:', error);
                return null;
            }
        }
        
        async function testLogin(email, password, userType = 'admin') {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing login...';
            
            try {
                // Get CSRF token first
                const csrfToken = await getCsrfToken();
                if (!csrfToken) {
                    resultDiv.innerHTML = 'Error: Could not get CSRF token';
                    return;
                }
                
                const formData = new FormData();
                formData.append('email', email);
                formData.append('password', password);
                formData.append('user_type', userType);
                // formData.append('g-recaptcha-response', 'test'); // Disabled for testing
                formData.append('_token', csrfToken);
                
                const response = await fetch('/login', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest',
                        'X-CSRF-TOKEN': csrfToken
                    }
                });
                
                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <h3 class="font-bold">Response (Status: ${response.status}):</h3>
                    <pre class="bg-white p-2 rounded mt-2 overflow-auto">${JSON.stringify(data, null, 2)}</pre>
                `;
                
                console.log('Login test result:', data);
                
            } catch (error) {
                resultDiv.innerHTML = `
                    <h3 class="font-bold text-red-600">Error:</h3>
                    <pre class="bg-white p-2 rounded mt-2">${error.message}</pre>
                `;
                console.error('Login test error:', error);
            }
        }
        
        function testInvalidPassword() {
            testLogin('juliustindugan14@gmail.com', 'wrongpassword123');
        }
        
        function testInvalidEmail() {
            testLogin('nonexistent@example.com', 'anypassword');
        }
    </script>
</body>
</html>
